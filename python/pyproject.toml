# Type-checking config for the frx prover port. Run from this `python/` dir: `mypy`.
[tool.mypy]
python_version = "3.11"
files = ["accumulation_zorch"]
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_unused_ignores = true
warn_redundant_casts = true

# Untyped / statically-unresolvable third parties: frx is an editable build
# whose .pyi stubs don't parse (frx.Array collapses to Any);
# zk_dtypes ships no py.typed; zorch is consumed off PYTHONPATH (DuplexSponge /
# Poseidon), not installed, so mypy can't import it. disallow_untyped_defs still
# enforces our own annotations regardless.
[[tool.mypy.overrides]]
module = ["frx.*", "frxlib.*", "zk_dtypes.*", "zorch.*"]
ignore_missing_imports = true
