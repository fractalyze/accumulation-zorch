name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (CPU build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Check out accumulation-zorch
        uses: actions/checkout@v4
        with:
          path: accumulation-zorch

      # The byte-match tests use the unmodified arkworks prover as their golden
      # oracle via the `ark-accumulation = { path = "../accumulation" }`
      # dev-dependency, so it must sit next to this checkout. Pinned for a
      # reproducible build.
      - name: Check out the arkworks accumulation oracle (dev-dependency)
        uses: actions/checkout@v4
        with:
          repository: arkworks-rs/accumulation
          ref: 4a680af486a061927e2e46f3d7bf8830a96752b7
          path: accumulation

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: accumulation-zorch

      # Scope to the main package: the `crates/zkx-pjrt` workspace member is the
      # GPU PJRT shim whose build runs bindgen (needs libclang + a vendored
      # header), so it is excluded here. With default features the `gpu` feature
      # and every `#![cfg(feature = "gpu")]` byte-match test stay off, so no
      # CUDA / PJRT plugin / libclang is needed. `--cap-lints=warn` keeps the
      # older arkworks oracle's lints from failing the build.
      - name: Build + test (CPU; GPU shim + GPU tests excluded)
        working-directory: accumulation-zorch
        env:
          RUSTFLAGS: "--cap-lints=warn"
          CARGO_NET_RETRY: "5"
        run: cargo test -p accumulation-zorch --verbose

  python:
    # The byte-match scripts are absltest cases; each is a jax CPU trace+prove
    # (the heavy fused-prove ones run ~30-60s), so they are split into a handful
    # of parallel shards — wall time is the slowest shard, not the sum, without
    # one GitHub check per file. Shards are balanced so the slow fused-prove
    # tests are spread across them. recursion_fold_zk_test.py is omitted (the full
    # recursion-circuit IVC fold is minutes-slow on CPU; its fold math is covered
    # by as_fold_zk*, its recursion circuit by recursion_nark*).
    name: Python (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: accumulation
            tests: "as_test.py as_zk_test.py absorb_test.py"
          - name: folding
            tests: "as_fold_zk_test.py as_fold_zk_e2e_test.py sponge_test.py jsponge_test.py"
          - name: hp
            tests: "as_hp_fold_zk_test.py hp_zk_test.py hp_test.py substrate_test.py"
          - name: nark
            tests: "nark_test.py nark_zk_test.py recursion_nark_test.py"
          - name: ipa
            tests: "ipa_test.py ipa_zk_test.py ipa_as_test.py ipa_as_zk_test.py jcurve_test.py recursion_nark_zk_test.py"
    steps:
      - uses: actions/checkout@v4

      # enable-cache makes the large jax-fork wheels a warm restore on later
      # runs, so the repeated per-shard install is cheap after the first run.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # The zkx Pasta jax fork registers the Pasta curve dtypes; the CPU backend
      # needs no GPU plugin (so `zkx-cuda-pjrt` is omitted vs the README's GPU
      # setup). Pins match README.md.
      - name: Create venv + install the zkx Pasta jax fork (CPU)
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv --index-strategy unsafe-best-match \
            --index-url https://fractalyze.github.io/pypi/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            jax==0.0.5.dev20260624111151 jaxlib==0.0.5.dev20260624111151 \
            zk-dtypes==0.0.7 numpy absl-py

      # Each absltest case exits non-zero on a byte-match failure. CPU-forced; the
      # GPU byte-match tests are separate (Rust, hardware-gated) and not run here.
      # `||` short-circuit fails the shard on the first failing test.
      - name: ${{ matrix.shard.name }}
        env:
          JAX_PLATFORMS: cpu
          PYTHONPATH: python
        run: |
          for t in ${{ matrix.shard.tests }}; do
            echo "::group::$t"
            .venv/bin/python "python/accumulation_zorch/testing/$t" || exit 1
            echo "::endgroup::"
          done
