name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (CPU build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Check out accumulation-zorch
        uses: actions/checkout@v4
        with:
          path: accumulation-zorch

      # The byte-match tests use the unmodified arkworks prover as their golden
      # oracle via the `ark-accumulation = { path = "../accumulation" }`
      # dev-dependency, so it must sit next to this checkout. Pinned for a
      # reproducible build.
      - name: Check out the arkworks accumulation oracle (dev-dependency)
        uses: actions/checkout@v4
        with:
          repository: arkworks-rs/accumulation
          ref: 4a680af486a061927e2e46f3d7bf8830a96752b7
          path: accumulation

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: accumulation-zorch

      # Scope to the main package: the `crates/zkx-pjrt` workspace member is the
      # GPU PJRT shim whose build runs bindgen (needs libclang + a vendored
      # header), so it is excluded here. With default features the `gpu` feature
      # and every `#![cfg(feature = "gpu")]` byte-match test stay off, so no
      # CUDA / PJRT plugin / libclang is needed. `--cap-lints=warn` keeps the
      # older arkworks oracle's lints from failing the build.
      - name: Build + test (CPU; GPU shim + GPU tests excluded)
        working-directory: accumulation-zorch
        env:
          RUSTFLAGS: "--cap-lints=warn"
          CARGO_NET_RETRY: "5"
        run: cargo test -p accumulation-zorch --verbose

  python:
    # The byte-match tests build + run under Bazel. `bazel test //python/...`
    # runs every absltest byte-match case in parallel (each sandboxed), so wall
    # time is the slowest test, not the sum — no manual sharding. zorch (the
    # IPA-PC prover/verifier + Poseidon sponge) and the zkx Pasta jax fork come
    # from Bazel — the git_override pin + the pip hub — so there is no venv /
    # PYTHONPATH. recursion_fold_zk_test is tagged `manual` and excluded (the full
    # recursion-circuit IVC fold is minutes-slow on CPU; its fold math is covered
    # by as_fold_zk*, its recursion circuit by recursion_nark*).
    name: Python (bazel byte-match)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # bazelisk reads .bazelversion and fetches the pinned Bazel.
      - uses: bazelbuild/setup-bazelisk@v3

      # Persist Bazel's repository cache (the jax-fork wheels, the hermetic
      # CPython, the zorch git_override clone) and disk cache (build/test
      # outputs) across runs; keyed on the dep-defining files.
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.bazel-cache/repo
            ~/.bazel-cache/disk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'requirements_lock_3_11.txt', '.bazelversion') }}
          restore-keys: bazel-${{ runner.os }}-

      # .bazelrc pins JAX_PLATFORMS=cpu; each test exits non-zero on a byte-match
      # failure. The GPU byte-match is separate (Rust, hardware-gated).
      - name: bazel test //python/...
        run: |
          bazel test //python/... \
            --repository_cache="$HOME/.bazel-cache/repo" \
            --disk_cache="$HOME/.bazel-cache/disk"
