name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (CPU build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Check out accumulation-zorch
        uses: actions/checkout@v4
        with:
          path: accumulation-zorch

      # The byte-match tests use the unmodified arkworks prover as their golden
      # oracle via the `ark-accumulation = { path = "../accumulation" }`
      # dev-dependency, so it must sit next to this checkout. Pinned for a
      # reproducible build.
      - name: Check out the arkworks accumulation oracle (dev-dependency)
        uses: actions/checkout@v4
        with:
          repository: arkworks-rs/accumulation
          ref: 4a680af486a061927e2e46f3d7bf8830a96752b7
          path: accumulation

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: accumulation-zorch

      # Default features only: the `gpu` feature (which pulls the xla-pjrt git
      # dep — bindgen + libclang) and every `#![cfg(feature = "gpu")]` byte-match
      # test stay off, so this CPU job needs no CUDA / PJRT plugin / libclang.
      # `--cap-lints=warn` keeps the older arkworks oracle's lints from failing
      # the build.
      #
      # `--workspace`, not `-p accumulation-zorch`: the latter skips the
      # `crates/fixture-json` member's own unit tests, which are what pin the
      # fixture codec's traps (the identity mapping, the sparse-matrix tuple
      # shape).
      - name: Build + test (CPU; gpu feature + GPU tests off)
        working-directory: accumulation-zorch
        env:
          RUSTFLAGS: "--cap-lints=warn"
          CARGO_NET_RETRY: "5"
        run: cargo test --workspace --verbose

      # The recursion feature is CPU-only — it is the reused arkworks in-circuit
      # verifier gadget, no GPU seam — but it is off by default, so the job above
      # compiles tests/recursion_step.rs to nothing and reports a green
      # `0 passed`. That silently hid `recursion_circuit_satisfiable`, the gate
      # its own module header calls "CPU gate (no GPU, --features recursion)".
      #
      # `--skip dump` excludes the four `dump_recursion_*` tests: they are
      # fixture generators, not gates, and cost ~74s and ~157 MB of off-tree
      # output. It is a substring filter, so it also catches a future
      # `*_dump_*` gate by accident — the cleaner fix is `#[ignore]` on the four
      # generators (the bench in the same file already uses it), which would fix
      # the local run too. That is deferred: the generators' documented
      # invocation is quoted in several docstrings, and `#[ignore]` silently
      # turns those into a no-op that still exits 0 unless every one gains
      # `-- --ignored`.
      - name: Test (CPU recursion gate)
        working-directory: accumulation-zorch
        env:
          RUSTFLAGS: "--cap-lints=warn"
          CARGO_NET_RETRY: "5"
        run: cargo test --features recursion --test recursion_step --verbose -- --skip dump

  python:
    # The byte-match tests build + run under Bazel. `bazel test //python/...`
    # runs every absltest byte-match case in parallel (each sandboxed), so wall
    # time is the slowest test, not the sum — no manual sharding. zorch (the
    # IPA-PC prover/verifier + Poseidon sponge) and the frx Pasta build come
    # from Bazel — the git_override pin + the pip hub — so there is no venv /
    # PYTHONPATH. recursion_fold_zk_test is tagged `manual` and excluded (the full
    # recursion-circuit IVC fold is minutes-slow on CPU; its fold math is covered
    # by as_fold_zk*, its recursion circuit by recursion_nark*).
    name: Python (bazel byte-match)
    # Self-hosted (same as zorch / sp1-zorch): the zorch git_override fetches the
    # private fractalyze/zorch repo, which needs the box's git credentials —
    # GitHub-hosted runners have none. These boxes also already have Bazel + warm
    # bazel/repository caches, so no setup-bazel / cache action (they would clobber
    # the box's ~/.bazelrc).
    runs-on: [self-hosted, cpu]
    steps:
      - uses: actions/checkout@v4

      # .bazelrc pins FRX_PLATFORMS=cpu; each test exits non-zero on a byte-match
      # failure. `//python/...` excludes the manual recursion_fold_zk_test;
      # `//export/...` adds the exporter lowering smoke test (the GPU byte-match
      # that exercises the exporters is separate — Rust, hardware-gated).
      - name: bazel test //python/... //export/...
        run: bazel test //python/... //export/...
